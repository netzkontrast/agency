[project]
name = "agency"
version = "0.1.0"
description = "An installable Claude Code plugin: a FastMCP engine over a bi-temporal GraphQLite graph; four concepts (Intent · Capability · Lifecycle · Memory) on code-mode as the contract."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "agency", email = "noreply@example.com" },
]
dependencies = [
    "graphqlite>=0.5.0",
    "fastmcp[code-mode]>=3.3.0",
    "pysqlite3-binary",
    "httpx",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0",
]

[project.scripts]
agency = "agency.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agency"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
