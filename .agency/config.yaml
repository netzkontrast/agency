# .agency/config.yaml — all agency config (Spec 328). Safe to edit.
# Precedence: environment variable > this file > built-in default.
# Generated by setup / `agency install`; re-running repairs missing keys
# non-destructively (your edits and comments are preserved).
core:
  db_path: .agency/session.db  # central bi-temporal graph DB (Spec 020) [env: AGENCY_DB]
  embedder: tfidf  # recall embedder backend (tfidf|bge) [env: AGENCY_EMBEDDER]
  token_backend: tiktoken  # token-count backend (anthropic|tiktoken|proxy) [env: AGENCY_TOKEN_BACKEND]

secrets:
  jules_api_key: "${env:JULES_API_KEY}"  # Jules remote-agent API key
  anthropic_api_key: "${env:ANTHROPIC_API_KEY}"  # Anthropic API key

frugal:
  level: full  # minimal-code discipline level (off|lite|full|ultra) [env: AGENCY_FRUGAL_LEVEL]
  stamp_every_verb: true  # M2: stamp the discipline on every verb's envelope prefix [env: AGENCY_FRUGAL_STAMP]

music:
  artist_name: ""  # music default — resolved by the music capability (artist_name)
  content_root: "~/music-projects"  # music default — resolved by the music capability (content_root)
  audio_root: ""  # music default — resolved by the music capability (audio_root)
  documents_root: ""  # music default — resolved by the music capability (documents_root)
  overrides: ""  # music default — resolved by the music capability (overrides)
  ideas_file: ""  # music default — resolved by the music capability (ideas_file)
  db_backend: sqlite  # music default — resolved by the music capability (db_backend)
  db_path: .agency/music.db  # music default — resolved by the music capability (db_path)
  sheet_music_enabled: true  # music default — resolved by the music capability (sheet_music_enabled)
  sheet_music_page_size: letter  # music default — resolved by the music capability (sheet_music_page_size)

novel:
  author_name: ""  # novel default — resolved by the novel capability (author_name)
  content_root: "~/novel-projects"  # novel default — resolved by the novel capability (content_root)
  ideas_file: ""  # novel default — resolved by the novel capability (ideas_file)
  default_genre: novel  # novel default — resolved by the novel capability (default_genre)
  default_target_word_count: 80000  # novel default — resolved by the novel capability (default_target_word_count)
  db_backend: sqlite  # novel default — resolved by the novel capability (db_backend)
  db_path: .agency/novel.db  # novel default — resolved by the novel capability (db_path)
