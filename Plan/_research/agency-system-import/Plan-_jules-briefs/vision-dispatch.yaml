- alias: vision-agentic
  title: "vision(agentic): design the agentic column of the 3×N matrix"
  branch: Master
  prompt: |
    You own the **agentic** column of the agency-system's 3×N matrix.
    Your goal: specify the canonical cell-shape of `agentic/<row>` such
    that every row's agentic cell is structurally identical and any
    agent can guess how one works from any other.

    ## Read first

    1. `vision/00-charter.md` — the matrix law, three rules, meta-row,
       18 Gherkin scenarios, source repos, discipline. The floor.
    2. `vision/agentic/BRIEF.md` — your detailed instructions: what
       agentic owns, what it does NOT own, what 4 files to write
       (COLUMN.md, ROW-EXAMPLES.md, INTERFACES.md, GHERKIN-OWNED.md),
       which Gherkin scenarios you own, which source-repo files matter.

    ## Quarantine

    DO NOT read these files (PR #133's prior design — your value is
    independence):
    - `docs/superpowers/specs/2026-05-19-agency-base-design.md`
    - `Plan/decisions/0001-…0008-*.md`
    - `docs/superpowers/specs/_drafts/agency-*-prototype.md`
    - `Plan/_reviews/`
    - `Plan/_jules-briefs/dispatch.yaml` (prior dispatch)

    ## Output

    Write 4 files under `vision/agentic/` (only). Affects allow-list =
    `vision/agentic/*`. Sizes per BRIEF.md.

    ## Discipline (`Plan/JULES_PROTOCOL.md` applies)

    Gate-1 confidence ≥ 0.90; cite source-repo file:line or VOCABULARY §.
    `## Evidence` + `## Self-Review` in your PR body.

    Publish your work via the standard flow.

